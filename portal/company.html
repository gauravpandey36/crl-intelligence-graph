<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Company intelligence — CRL Intelligence</title>
<style>
:root{--p:#4F46E5;--sky:#0EA5E9;--amb:#F59E0B;--ink:#0F172A;--mut:#64748B;--bg:#F8FAFC;--card:#fff;--rule:#E2E8F0;
--dang:#EF4444;--ok:#10B981}
*{box-sizing:border-box}body{margin:0;font-family:'Inter',-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
.bar{background:#fff;border-bottom:1px solid var(--rule);padding:10px 18px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;flex-wrap:wrap}
.bar a.brand{font-weight:700;color:var(--p);text-decoration:none}
.bar a{color:var(--ink);text-decoration:none;font-size:14px;font-weight:500}.bar a:hover{color:var(--p)}
.bar .sp{flex:1}
.bar input{border:1px solid var(--rule);border-radius:8px;padding:7px 11px;font:inherit;min-width:220px}
.wrap{max-width:1020px;margin:0 auto;padding:24px 18px 60px}
.crumb{font-size:13px;color:var(--mut);margin-bottom:6px}
h1{font-size:30px;margin:.1em 0 .3em}
.verdict{font-size:18px;color:#334155;margin:0 0 14px;max-width:760px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.badge{border-radius:999px;padding:5px 13px;font-size:13px;font-weight:600;border:1px solid var(--rule);background:#fff}
.badge.b-crl{background:#EEF2FF;color:#3730A3;border-color:#C7D2FE}
.badge.b-enf{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.badge.b-clean{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.badge.b-band{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:16px 18px}
.card h2{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:0 0 12px}
.score{display:flex;align-items:baseline;gap:10px}.score .n{font-size:40px;font-weight:700;line-height:1}
.score .b{font-size:15px;font-weight:600}
.bd{font-size:13px;border-top:1px solid var(--rule);margin-top:12px;padding-top:10px}
.bd .row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed var(--rule)}
.bd .why{color:var(--mut);font-size:12px}
.hit{border-left:3px solid var(--amb);background:#FFFBEB;padding:7px 11px;border-radius:0 8px 8px 0;margin:7px 0;font-size:13.5px}
.hit a{color:var(--p)}
.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{background:#F1F5F9;border:1px solid var(--rule);border-radius:7px;padding:3px 9px;font-size:12.5px;color:#334155}
.bars .br{display:grid;grid-template-columns:120px 1fr 34px;align-items:center;gap:8px;margin:5px 0;font-size:13px}
.bars .fill{height:14px;background:var(--p);border-radius:4px}
.crl{border:1px solid var(--rule);border-radius:12px;padding:14px 16px;margin:10px 0;background:#fff}
.crl .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.crl .dr{font-weight:600;font-size:16px}
.crl .meta{color:var(--mut);font-size:13px}.crl .rsn{font-size:14px;color:#334155;margin:7px 0 0}
.crl .src a{font-size:12px;color:var(--p);margin-right:10px}
h2.sec{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--p);border-bottom:1px solid var(--rule);padding-bottom:6px;margin:28px 0 6px}
.prov{font-size:12.5px;color:var(--mut);background:#fff;border:1px solid var(--rule);border-radius:12px;padding:14px 16px;margin-top:20px}
.prov b{color:#334155}
a.btn{display:inline-block;background:var(--p);color:#fff;text-decoration:none;border-radius:9px;padding:9px 15px;font-weight:600;font-size:14px}
@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:25px}}
.crl-launch{position:fixed;right:18px;bottom:18px;z-index:90;background:var(--p);color:#fff;border:none;border-radius:999px;
padding:12px 18px;font:inherit;font-weight:600;cursor:pointer;box-shadow:0 10px 30px rgba(79,70,229,.4);display:flex;gap:8px;align-items:center}
.crl-launch .d{width:9px;height:9px;border-radius:50%;background:#34D399}
#g{position:fixed;right:18px;bottom:18px;width:360px;max-width:93vw;max-height:74vh;background:#fff;border:1px solid var(--rule);
border-radius:14px;box-shadow:0 18px 50px rgba(15,23,42,.22);z-index:91;display:none;flex-direction:column}
#g .h{background:var(--p);color:#fff;padding:11px 14px;border-radius:14px 14px 0 0;font-weight:600;display:flex;justify-content:space-between}
#g .h button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
#g .b{padding:13px;overflow:auto;flex:1;font-size:14px}#g .f{display:flex;gap:6px;padding:10px;border-top:1px solid var(--rule)}
#g input{flex:1;border:1px solid var(--rule);border-radius:8px;padding:9px;font:inherit}#g .f button{border:none;background:var(--p);color:#fff;border-radius:8px;padding:9px 13px;cursor:pointer;font-weight:600}
.m{margin:0 0 9px}.m.u{text-align:right}.m.u span{background:var(--p);color:#fff;padding:6px 10px;border-radius:12px 12px 2px 12px;display:inline-block}
.m.g span{background:#EEF2FF;padding:6px 10px;border-radius:12px 12px 12px 2px;display:inline-block}
</style></head><body>
<div class="bar">
 <a class="brand" href="index.html">CRL Intelligence</a>
 <a href="index.html">Home</a><a href="dashboard.html">Dashboard</a><a href="explorer.html">Graph</a>
 <span class="sp"></span>
 <input id="cs" list="cl" placeholder="look up a company…" onchange="go(this.value)">
 <datalist id="cl"></datalist>
</div>
<div class="wrap" id="main"><p style="color:var(--mut)">Loading…</p></div>

<button class="crl-launch" id="gl" onclick="G.open()"><span class="d"></span> Ask the guide</button>
<div id="g"><div class="h"><span>Your guide</span><button onclick="G.close()">&times;</button></div>
 <div class="b" id="gb"></div><div class="f"><input id="gi" placeholder="ask about this company…" onkeydown="if(event.key==='Enter')G.send()"><button onclick="G.send()">Send</button></div></div>

<script>
const E=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const qp=new URLSearchParams(location.search), SLUG=qp.get('c');
let DB=null, SEARCH=null;
function go(v){const f=(SEARCH||[]).find(x=>x.name.toLowerCase()===v.toLowerCase()||x.slug===v);if(f)location.href='company.html?c='+f.slug;}
Promise.all([fetch('data/companies.json').then(r=>r.json()),fetch('data/search.json').then(r=>r.json())]).then(([db,se])=>{
 DB=db;SEARCH=se;
 document.getElementById('cl').innerHTML=se.slice(0,300).map(x=>`<option value="${E(x.name)}">`).join('');
 render();
});
function render(){
 const d=DB[SLUG]; const m=document.getElementById('main');
 if(!d){m.innerHTML='<p>Company not found. <a href="index.html">Back home</a>.</p>';return;}
 const yr=d.years?`${d.years[0]}–${d.years[1]}`:'';
 const enf=d.enforcement, risk=d.risk;
 const verdict = `${E(d.name)} received ${d.crl_count} FDA Complete Response Letter${d.crl_count>1?'s':''}${yr?' ('+yr+')':''}`+
   (enf.n_events>0?`, and also appears in the public enforcement record with ${enf.n_events} signal${enf.n_events>1?'s':''} (${enf.kinds.join(', ')}).`:`. No public enforcement match was found (not a clean bill — FDA does not inspect everyone).`);
 const bcls = risk.band==='Elevated'?'b-enf':risk.band==='Moderate'?'b-band':'b-clean';
 let bd = (risk.breakdown||[]).map(b=>`<div class="row"><div>${E(b.list)} <span class="why">— ${E(b.why)}</span></div><div><b>+${b.points}</b></div></div>`).join('') || '<div class="why">No public enforcement signal on the watch lists screened.</div>';
 let hits = enf.hits.length? enf.hits.map(h=>`<div class="hit"><b>${E(h.list)}</b> — ${Math.round((h.confidence||0)*100)}% ${E(h.level||'')} confidence (matched ‘${E(h.matched_firm||'')}’)${h.source?` · <a href="${E(h.source)}" target="_blank" rel="noopener">source</a>`:''}</div>`).join('') : '<p style="color:var(--mut)">No public watch-list match (Import Alert 66-40, debarment, recalls).</p>';
 const maxd = Math.max(1,...d.deficiencies.map(x=>x[1]));
 let bars = d.deficiencies.map(x=>`<div class="br"><span>${E(x[0])}</span><span><span class="fill" style="width:${Math.round(x[1]/maxd*100)}%"></span></span><b>${x[1]}</b></div>`).join('') || '<span class="why">—</span>';
 let crls = d.crls.map(c=>`<div class="crl"><div class="top"><span class="dr">${E(c.drug||'(drug redacted)')}</span><span class="meta">${c.year||''} · ${E(c.app_type||'')}${c.area?' · '+E(c.area):''}</span></div>`+
   `<div class="chips" style="margin-top:7px">${(c.deficiencies||[]).map(x=>`<span class="chip">${E(x)}</span>`).join('')}</div>`+
   (c.reason?`<p class="rsn">${E(c.reason)}</p>`:'')+
   (c.sources&&c.sources.length?`<div class="src" style="margin-top:6px">${c.sources.map(s=>`<a href="${E(s)}" target="_blank" rel="noopener">source ↗</a>`).join('')}</div>`:'')+`</div>`).join('');
 m.innerHTML = `<div class="crumb"><a href="index.html">Home</a> / Company intelligence</div>`+
  `<h1>${E(d.name)}</h1><p class="verdict">${verdict}</p>`+
  `<div class="badges"><span class="badge b-crl">${d.crl_count} CRL${d.crl_count>1?'s':''}</span>`+
   (enf.n_events>0?`<span class="badge b-enf">${enf.n_events} enforcement signal${enf.n_events>1?'s':''}</span>`:`<span class="badge b-clean">no enforcement match</span>`)+
   `<span class="badge ${bcls}">${risk.band} exposure</span></div>`+
  `<div class="grid">`+
   `<div class="card"><h2>Exposure score (public-record screening signal)</h2>`+
     `<div class="score"><span class="n">${risk.exposure_index}</span><span class="b" style="color:${risk.band==='Elevated'?'#EF4444':risk.band==='Moderate'?'#B45309':'#065F46'}">${risk.band}</span></div>`+
     `<div class="bd">${bd}</div>`+
     `<p class="why" style="margin-top:10px">Additive, fully traceable: each point above ties to a dated public record, weighted by severity and recency. <b>Descriptive, not predictive</b> of FDA action; not a GMP-audit verdict.</p></div>`+
   `<div class="card"><h2>Enforcement footprint</h2>${hits}</div>`+
  `</div>`+
  `<div class="grid" style="margin-top:16px">`+
   `<div class="card"><h2>At a glance</h2><div class="chips">`+
     d.app_types.map(x=>`<span class="chip">${E(x[0])}: ${x[1]}</span>`).join('')+
     d.areas.map(x=>`<span class="chip">${E(x[0])}</span>`).join('')+`</div>`+
     `<div class="chips" style="margin-top:8px">${d.drugs.slice(0,12).map(x=>`<span class="chip">${E(x)}</span>`).join('')}</div></div>`+
   `<div class="card"><h2>What FDA cited (deficiency types)</h2><div class="bars">${bars}</div></div>`+
  `</div>`+
  `<h2 class="sec">CRL history (${d.crl_count})</h2>${crls}`+
  `<div class="prov"><b>Provenance & method (ALCOA-aligned).</b> Built on public FDA records: openFDA Complete Response Letters, openFDA drug enforcement (recalls), FDA Import Alert 66-40, and the FDA Debarment List. Each CRL links to its source; each enforcement signal is confidence-scored against the named watch-list firm and dated. Corpus: 333 CRLs, 2005–2026 — absence of a signal is not a clean bill of health. As presented: 2026-06-15. Educational, not regulatory advice. <a href="explorer.html">See this entity in the graph ↗</a></div>`;
 document.title = d.name+' — CRL Intelligence';
}
const SID='s'+Math.random().toString(36).slice(2);
const G={open(){document.getElementById('gl').style.display='none';document.getElementById('g').style.display='flex';if(!G._o){G._o=1;G.say('')}setTimeout(()=>document.getElementById('gi').focus(),50)},
 close(){document.getElementById('g').style.display='none';document.getElementById('gl').style.display='flex'},
 add(w,t){const b=document.getElementById('gb');b.insertAdjacentHTML('beforeend',`<p class="m ${w}"><span>${E(t)}</span></p>`);b.scrollTop=b.scrollHeight},
 async say(m){if(m)this.add('g','…');let d;try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:SID,msg:m||('Tell me about '+(DB&&DB[SLUG]?DB[SLUG].name:'this company'))})});d=await r.json()}catch(e){d={text:'The guide is briefly offline.'}}if(m){const b=document.getElementById('gb');if(b.lastElementChild)b.lastElementChild.remove()}this.add('g',d.text||'Hello.')},
 send(){const i=document.getElementById('gi'),m=i.value.trim();if(!m)return;i.value='';this.add('u',m);this.say(m)}};
</script></body></html>
